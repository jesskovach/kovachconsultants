title: Kovach Consulting Group
email: jessica@kovachconsultants.com
description: >-
  Leadership strategy, organizational design, and systemic performance consulting
  for mission-driven organizations and institutional leaders navigating complexity.
url: "https://kovachconsultants.com"
baseurl: ""
lang: en

author:
  name: Jess Kovach
  email: jessica@kovachconsultants.com
  url: https://kovachconsultants.com

theme: minima

header_pages:
  - about.markdown
  - services.html
  - writing.md
  - contact.md

plugins:
  - jekyll-feed
  - jekyll-seo-tag

twitter:
  username: CivicSaboteur

social:
  name: Jess Kovach
  links:
    - https://www.linkedin.com/in/jessicakovach
    - https://substack.com/@jessicakovach

feed:
  title: Kovach Consulting Group
  path: feed.xml

defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "page"
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: Jess Kovach

timezone: America/New_York

markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge

exclude:
  - .sass-cache/
  - .jekyll-cache/
  - .git/
  - node_modules/
  - vendor/
  - Gemfile
  - Gemfile.lock
  - README.md

include:
  - tools
